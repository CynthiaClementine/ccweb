<!DOCTYPE html>
<html>

	-->
	<head>
		<title>Welcome to casting</title>
		<link rel="icon" type="image/x-icon" href="./favicon.png">
		<meta charset="utf-8">
		<style>
			html, body {
				margin: 5px; 
				height: 100%; 
				overflow-y: hidden;
			}
			body {
				background-color: slateblue;
				display: flex;
				font-family: Courier New;
				font-size: 1.5rem;
			}
			
			button {
				background-color: #FFF;
				font-size: 1.5rem;
				padding: 2px 10px 5px 10px;
				border: #111 5px solid;
			}
			
			#wrapper canvas {
				position: absolute;
				top: 0;
				left: 0;
				
				image-rendering: optimizeSpeed;
				image-rendering: -webkit-crisp-edges;
				image-rendering: -moz-crisp-edges;
				image-rendering: -o-crisp-edges;
				image-rendering: crisp-edges;
				image-rendering: -webkit-optimize-contrast;
				image-rendering: optimize-contrast;
				image-rendering: pixelated;
				-ms-interpolation-mode: nearest-neighbor;
			}
	
			#centerModule {
				text-align: center;
				margin: auto;
			}
			
			p {
				user-select: none;
			}
			
			#editorPanelGroup {
				float: right;
			}
			
			#group_nature {
				padding: 8px 0px 4px 10px;
			}
			
			.sliderGroup {
				display: inline;
			}
			
			.slider {
				width: 600px;
				-webkit-appearance: none;
				height: 10px;
				background: #111;
				margin: 0;
			}
			
			/* custom thumb */
			.slider::-webkit-slider-thumb {
				-webkit-appearance: none;
				appearance: none;
				width: 25px;
				height: 25px;
				border: #111 5px solid;
				cursor: pointer;
			}
			
			.value {
				width: 10%;
				text-align: center;
				border-right: #e6e4e4 1px solid;
				font-size: 1.5rem;
				font-weight: 600;
				color: #3c3b3b;
			}
			.slider::-moz-range-thumb {
				width: 20px;
				height: 20px;
				border: 0;
				background: #FFFFFF;
				border: #111 5px solid; cursor: pointer;
			}
			
			
			/* checkboxes */
			.checkboxGroup {
				display: inline-block;
				position: relative;
				padding-left: 32px;
				cursor: pointer;
				font-size: 22px;
				user-select: none;
			}
			
			/* Hide the browser's default checkbox */
			.checkboxGroup input {
				display: none;
			}
			
			.checkmark {
				position: absolute;
				top: -2.5px;
				left: -2.5px;
				height: 20px;
				width: 20px;
				border: #111 5px solid;
			}
			
			.checkboxGroup:hover input ~ .checkmark {
				background-color: #88A;
			}
			
			.checkboxGroup input:checked ~ .checkmark {
				background-color: #111;
			}
		</style>
		<script src="../common/functions-coordinate.js"></script>
		<script src="../common/functions-math.js"></script>
		<script src="functions-helper.js"></script>
		<script src="functions-gpu.js"></script>
	
		<script src="config.js"></script>
		<script src="editor.js"></script>
		<script src="objects-player.js"></script>
		<script src="objects-engine.js"></script>
		<script src="materials.js"></script>
		<script src="objects.js"></script>
		<script src="worlds.js"></script>
		<script src="main.js"></script>
	</head>
	<body>
		<div id="wrapper">
			<canvas id="glbox"></canvas>
			<canvas id="viewbox"></canvas>
			<div id="editorPanelGroup" x="600">
				<div id="editorSpace">
					<div>
						avg frame time: <span id="debugMSPF">[!]</span> ms
					</div>
					<br>
					<div id="group_settings">
						<div class="separator">SETTINGS</div>
					</div>
					<br>
					
					<div class="separator">OBJECT</div>
					<select id="objectDropdown"></select>
					
					<div id="group_nature">
					</div>
	
					<div id="group_pos">
						<div>Angle controls</div>
					</div>
					<br>
					
					<div id="group_radius">
						<div>Radius controls</div>
					</div>
					<br>
					
					<div id="group_special">
						<div>Other controls</div>
					</div>
					
					<div class="separator">MATERIAL</div>
					<select id="materialDropdown"></select>
					
					<div id="group_color">
						<div>Color controls</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
