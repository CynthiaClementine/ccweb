<!DOCTYPE html>
<html>

<div class="container">
	<datalist id="markers">
		<option value="-100"></option>
		<option value="-90"></option>
		<option value="-80"></option>
		<option value="-70"></option>
		<option value="-60"></option>
		<option value="-50"></option>
		<option value="-40"></option>
		<option value="-30"></option>
		<option value="-20"></option>
		<option value="0"></option>
		<option value="20"></option>
		<option value="30"></option>
		<option value="40"></option>
		<option value="50"></option>
		<option value="60"></option>
		<option value="70"></option>
		<option value="80"></option>
		<option value="90"></option>
		<option value="100"></option>
	</datalist>


	<div class="sliderGroup" id="xSlider">
		<span class="value">[!]</span>
		<input class="slider" type="range" list="markers">
	</div>
	<div class="sliderGroup" id="ySlider">
		<span class="value">[!]</span>
		<input class="slider" type="range" list="markers">
	</div>
	<div class="sliderGroup" id="zSlider">
		<span class="value">[!]</span>
		<input class="slider" type="range" list="markers">
	</div>
</div>

<head>
	<style>
		.sliderGroup {
			display: inline;
			width: 1200px;
		}
		
		.slider {
			width: 90%;
			-webkit-appearance: none;
			height: 10px;
			background: #f1f1f1;
			margin: 0;
		}
		
		/* custom thumb */
		.slider::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 25px;
			height: 25px;
			/*border-radius: 50%;*/
			border: #111 5px solid;
			cursor: pointer;
			-webkit-transition: background .15s ease-in-out;
			transition: background .15s ease-in-out;
		}
		
		.slider::-webkit-slider-thumb:hover {
			background: #FFFFFF;
		}
		
		.value {
			width: 10%;
			text-align: center;
			border-right: #e6e4e4 1px solid;
			font-size: 2rem;
			font-weight: 600;
			color: #3c3b3b;
		}
		.slider::-moz-range-thumb {
			width: 20px;
			height: 20px;
			border: 0;
			/*border-radius: 50%;*/
			background: #FFFFFF;
			border: #111 5px solid; cursor: pointer;
		}
	</style>
	
	<script>
		class Slider {
			/**
			* @param {HTMLElement} sliderElem the slider input element
			* @param {HTMLElement} valueElem the slider text element
			* @param {String} variable how to reference the variable to write to. Will be `eval`ed later.
			* @param {Number} min minimum slider value
			* @param {Number} max maximum slider value
			* @param {Number} stepSize step size between acceptable values
			* @param {Boolean} relative whether values should be treated as relative values (true) or absolute values (false)
			 */
			constructor(sliderElem, valueElem, variable, min, max, stepSize, relative) {
				this.rel = relative;
				this.sliderElem = sliderElem;
				this.valueElem = valueElem;
				this.min = min;
				this.max = max;
				this.step = stepSize;
				this.var = variable;
				this.offset = 0;
				this.init();
			}
			
			value() {
				return +this.sliderElem.value + (this.rel ? this.offset : 0);
			}
		
			init() {
				this.sliderElem.addEventListener('input', this.updateDisplay.bind(this));
				this.sliderElem.addEventListener('change', this.updateValue.bind(this));
				this.sliderElem.setAttribute(`min`, this.min);
				this.sliderElem.setAttribute(`max`, this.max);
				this.sliderElem.setAttribute(`step`, this.step);
				this.sliderElem.value = 0;
				this.synchronize();
			}
			
			synchronize() {
				this.offset = eval(this.var);
				this.updateDisplay();
			}
		
			generateBackground() {
				let percentage = (this.sliderElem.value - this.min) / (this.max - this.min) * 100;
				return `background: linear-gradient(to right, #1C1, #040 ${percentage}%, #400 ${percentage}%, #C11 100%)`;
			}
		
			updateDisplay(e) {
				this.valueElem.innerHTML = this.value(); 
				this.sliderElem.style = this.generateBackground();
			}
			
			updateValue(e) {
				this.offset = this.value();
				eval(`${this.var} = ${this.offset};`);
				this.sliderElem.value = 0;
				this.updateDisplay();
			}
		}
		var secret = 4;
		
		// let sliderElem = document.querySelector(`.sliderGroup .slider`);
		// let valueElem = document.querySelector('.sliderGroup .value');
		var slider;
		
		slider = new Slider(document.getElementById("xSlider").children[1], document.getElementById("xSlider").children[0], `secret`, -100, 100, 1, true);
		slider.init();
	</script>
</head>




</html>
